<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ai-learn · wangliangsheng</title>
    <meta
      name="description"
      content="wangliangsheng 的 AI 学习笔记：Agent、生成式 UI、RAG 与多 Agent 协作。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,500;8..60,700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #14201c;
        --mute: #4a5c54;
        --paper: #eef3ef;
        --panel: #f7faf7;
        --line: #c5d4cb;
        --signal: #0d7a5f;
        --glow: #9fd9c4;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        color: var(--ink);
        font-family: "Source Serif 4", Georgia, serif;
        background:
          radial-gradient(ellipse 80% 50% at 10% -10%, var(--glow), transparent 55%),
          radial-gradient(ellipse 60% 40% at 100% 0%, #dce8e2, transparent 50%),
          linear-gradient(180deg, #e7efe9 0%, var(--paper) 45%, #e4ebe6 100%);
      }

      .shell {
        width: min(720px, calc(100% - 2.5rem));
        margin: 0 auto;
        padding: 18vh 0 4rem;
      }

      .brand {
        font-family: "IBM Plex Mono", ui-monospace, monospace;
        font-size: 0.8rem;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--signal);
        margin: 0 0 1.25rem;
        opacity: 0;
        animation: rise 0.7s ease forwards;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.4rem, 7vw, 3.6rem);
        line-height: 1.05;
        letter-spacing: -0.03em;
        font-weight: 700;
        opacity: 0;
        animation: rise 0.7s ease 0.08s forwards;
      }

      .lede {
        margin: 1.25rem 0 0;
        max-width: 34rem;
        font-size: 1.15rem;
        line-height: 1.55;
        color: var(--mute);
        opacity: 0;
        animation: rise 0.7s ease 0.16s forwards;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 2rem;
        opacity: 0;
        animation: rise 0.7s ease 0.24s forwards;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 2.75rem;
        padding: 0 1.1rem;
        border-radius: 999px;
        font-family: "IBM Plex Mono", ui-monospace, monospace;
        font-size: 0.85rem;
        text-decoration: none;
        transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      .btn-primary {
        background: var(--ink);
        color: #f4faf6;
      }

      .btn-primary:hover {
        background: var(--signal);
      }

      .btn-ghost {
        background: transparent;
        color: var(--ink);
        border: 1px solid var(--line);
      }

      .btn-ghost:hover {
        background: var(--panel);
      }

      .topics {
        margin-top: 3.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--line);
        opacity: 0;
        animation: rise 0.7s ease 0.32s forwards;
      }

      .topics h2 {
        margin: 0 0 0.85rem;
        font-family: "IBM Plex Mono", ui-monospace, monospace;
        font-size: 0.75rem;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--mute);
      }

      .topics ul {
        margin: 0;
        padding: 0;
        list-style: none;
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem 0.65rem;
      }

      .topics li {
        font-family: "IBM Plex Mono", ui-monospace, monospace;
        font-size: 0.82rem;
        color: var(--ink);
        background: color-mix(in srgb, var(--panel) 80%, white);
        border: 1px solid var(--line);
        padding: 0.45rem 0.7rem;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .brand,
        h1,
        .lede,
        .actions,
        .topics {
          animation: none;
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <p class="brand">ai-learn</p>
      <h1>学 AI，边做边记。</h1>
      <p class="lede">
        我是 wangliangsheng，前端与 Agent 工程师。这里记录生成式 UI、上下文工程、工具调用、RAG
        与多 Agent 协作的实践笔记。
      </p>
      <div class="actions">
        <a class="btn btn-primary" href="https://github.com/wanglsh97">GitHub</a>
        <a class="btn btn-ghost" href="https://x.com/wang_ls97">X / Twitter</a>
      </div>
      <section class="topics" aria-label="学习主题">
        <h2>正在探索</h2>
        <ul>
          <li>Generative UI</li>
          <li>Context Engineering</li>
          <li>Tool Calling</li>
          <li>RAG</li>
          <li>Multi-Agent</li>
        </ul>
      </section>
    </main>
  </body>
</html>
